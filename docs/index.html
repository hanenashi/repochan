<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Starting Repochan</title>
    <style>
      :root {
        color: #172326;
        background: #eef5f6;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        align-items: center;
        display: flex;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
        padding: 24px;
      }

      main {
        background: #ffffff;
        border: 1px solid #d5e3e6;
        border-radius: 8px;
        max-width: 680px;
        padding: 42px;
        text-align: center;
        width: 100%;
      }

      .mark {
        align-items: center;
        background: #e8f6f8;
        border: 1px solid #cde4e8;
        border-radius: 50%;
        color: #62b9c6;
        display: inline-flex;
        font-size: 44px;
        font-weight: 900;
        height: 94px;
        justify-content: center;
        margin-bottom: 24px;
        width: 94px;
      }

      .eyebrow {
        color: #5d8f98;
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0;
        margin: 0 0 6px;
        text-transform: uppercase;
      }

      h1 {
        font-size: clamp(2.2rem, 8vw, 4.5rem);
        line-height: 1;
        margin: 0 0 14px;
      }

      p {
        color: #52666b;
        font-size: 1.05rem;
        line-height: 1.55;
        margin: 0 auto 22px;
        max-width: 480px;
      }

      .loading-bar {
        background: #edf4f5;
        border-radius: 999px;
        height: 10px;
        margin: 0 auto 20px;
        max-width: 360px;
        overflow: hidden;
        width: 100%;
      }

      .loading-bar span {
        animation: loading-slide 1.35s ease-in-out infinite;
        background: #f2c335;
        border-radius: inherit;
        display: block;
        height: 100%;
        width: 42%;
      }

      .status {
        color: #172326;
        font-weight: 800;
        min-height: 24px;
      }

      a {
        color: #477d86;
        font-weight: 800;
      }

      @keyframes loading-slide {
        0% {
          transform: translateX(-110%);
        }

        100% {
          transform: translateX(250%);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">R</div>
      <p class="eyebrow">Repochan Light</p>
      <h1>Starting HACCP</h1>
      <p>
        Repochan is waking the daily checklist service. This can take a little while on the free Render plan after inactivity.
      </p>
      <div class="loading-bar" aria-hidden="true">
        <span></span>
      </div>
      <p class="status" id="status">Checking the service...</p>
      <p>
        <a href="https://repochan.onrender.com">Open Repochan directly</a>
      </p>
    </main>

    <script>
      const renderUrl = "https://repochan.onrender.com";
      const healthUrl = `${renderUrl}/api/health`;
      const status = document.getElementById("status");
      let attempt = 0;

      function wait(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      async function fetchWithTimeout(url, timeoutMs) {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), timeoutMs);

        try {
          const response = await fetch(url, {
            cache: "no-store",
            signal: controller.signal
          });
          return response.ok;
        } catch {
          return false;
        } finally {
          clearTimeout(timer);
        }
      }

      async function wake() {
        while (true) {
          attempt += 1;
          status.textContent = attempt === 1 ? "Waking Repochan..." : `Still waking Repochan... try ${attempt}`;

          if (await fetchWithTimeout(healthUrl, 8000)) {
            status.textContent = "Repochan is ready. Opening now...";
            window.location.replace(renderUrl);
            return;
          }

          await wait(2500);
        }
      }

      wake();
    </script>
  </body>
</html>
